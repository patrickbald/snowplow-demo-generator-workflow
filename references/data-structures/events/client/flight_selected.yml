apiVersion: v1
resourceType: data-structure
meta:
  hidden: false
  schemaType: event
  customData: {}
data:
  $schema: 'http://iglucentral.com/schemas/com.snowplowanalytics.self-desc/schema/jsonschema/1-0-0#'
  description: 'User selects a flight from search results'
  self:
    vendor: com.snowplow.demo
    name: flight_selected
    format: jsonschema
    version: 1-0-0
  type: object
  properties:
    session_id:
      type: string
      description: 'Chat session identifier'
      maxLength: 36
    flight_id:
      type: string
      description: 'Unique identifier for the selected flight'
      maxLength: 50
    flight_number:
      type:
        - string
        - 'null'
      description: 'Flight number (e.g., BA123)'
      maxLength: 20
    airline:
      type:
        - string
        - 'null'
      description: 'Airline name'
      maxLength: 100
    price:
      type: number
      description: 'Price of the flight'
      minimum: 0
      maximum: 1000000
    currency:
      type: string
      description: 'Currency code (e.g., GBP, USD)'
      maxLength: 3
    selection_criteria:
      type:
        - string
        - 'null'
      enum:
        - price
        - duration
        - departure_time
        - arrival_time
        - other
        - null
      description: 'What criterion influenced the selection'
    position_in_results:
      type:
        - integer
        - 'null'
      description: 'Position of this flight in the search results (1-indexed)'
      minimum: 1
      maximum: 1000
    selected_at:
      type: string
      format: date-time
      description: 'Timestamp when flight was selected'
  required:
    - session_id
    - flight_id
    - price
    - currency
    - selected_at
  additionalProperties: false


