apiVersion: v1
resourceType: data-structure
meta:
  hidden: false
  schemaType: event
  customData: {}
data:
  $schema: 'http://iglucentral.com/schemas/com.snowplowanalytics.self-desc/schema/jsonschema/1-0-0#'
  description: 'Agent logs its interpretation of user intent. Agent context provides invocation and state details.'
  self:
    vendor: com.snowplow.demo
    name: user_intent_detected
    format: jsonschema
    version: 1-0-0
  type: object
  properties:
    invocation_id:
      type: string
      description: 'Parent invocation identifier'
      maxLength: 36
    intent_id:
      type: string
      description: 'Unique identifier for this intent detection'
      maxLength: 36
    intent_category:
      type: string
      enum:
        - search_flights
        - book_flight
        - modify_booking
        - cancel_booking
        - get_recommendations
        - ask_question
      description: 'Categorized user intent'
    confidence:
      type: number
      minimum: 0
      maximum: 1
      description: 'Agent confidence in intent interpretation'
    extracted_entities:
      type: object
      description: 'Entities extracted from user message'
      additionalProperties: true
    reasoning:
      type:
        - string
        - 'null'
      description: 'Agent reasoning for this interpretation'
      maxLength: 1000
    detected_at:
      type: string
      format: date-time
      description: 'Timestamp when intent was detected'
  required:
    - invocation_id
    - intent_id
    - intent_category
    - confidence
    - extracted_entities
    - detected_at
  additionalProperties: false

